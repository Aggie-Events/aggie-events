services:
  app:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: app_container
    environment:
      - NODE_ENV=production
    env_file:
      - frontend/.env
    depends_on:
      - backend-api
    ports:
      - "3000:3000"
  backend-api:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: backend_container
    environment:
      - NODE_ENV=production
    env_file:
      - backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - db
  db:
    container_name: postgres_container
    image: postgres
    restart: always
    volumes: 
      - ./pgdata:/var/lib/postgresql/data
    expose:
      - 5432
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "agev"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
