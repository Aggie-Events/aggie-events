services:
  traefik:
    image: traefik:v3.1.4
    container_name: traefik
    restart: always
    ports:
      - "80:80"        # HTTP
      - "443:443"      # HTTPS
      - "8080:8080"    # Traefik dashboard (optional)
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
      #- --log.filepath=/var/log/traefik.log
      - --accesslog=true
      #- --accesslog.filepath=/var/log/traefik-access.log
      - --providers.docker.network=traefik-network
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entryPoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      # remove next line when using Traefik v2
      - --entrypoints.websecure.asDefault=true 
      - --entrypoints.websecure.http.tls.certresolver=letsencrypt
      - --certificatesresolvers.letsencrypt.acme.email=zanbowie138@gmail.com
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"  # Store SSL certificates
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
    networks:
      - traefik-network
  app:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: app_container
    environment:
      - NODE_ENV=production
    env_file:
      - frontend/.env
    depends_on:
      - backend-api
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`aggieevents.tech`)"  # Replace with your domain
      - "traefik.http.routers.app.entrypoints=websecure"     # HTTPS
      - "traefik.http.routers.app.tls=true"  # Enable SSL
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"  # Use Let's Encrypt for SSL
      - traefik.docker.network=traefik-network
    networks:
      - traefik-network
  backend-api:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: backend_container
    environment:
      - NODE_ENV=production
    env_file:
      - backend/.env
    expose:
      - "5000"
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.aggieevents.tech`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"  # Enable SSL
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - traefik.docker.network=traefik-network
    networks:
      - traefik-network
  db:
    container_name: postgres_container
    image: postgres
    restart: always
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "agev"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik-network
  whoami:
    container_name: whoami
    image: traefik/whoami
    labels:
      - traefik.enable=true
      - traefik.http.routers.mywhoami.rule=Host(`whoami.aggieevents.tech`) 
      - traefik.http.services.mywhoami.loadbalancer.server.port=80

      - traefik.http.middlewares.mywwwredirect.redirectregex.regex=^https://www\.(.*)
      - traefik.http.middlewares.mywwwredirect.redirectregex.replacement=https://$${1}
      - traefik.http.routers.mywhoami.middlewares=mywwwredirect
      - traefik.docker.network=traefik-network
    networks:
      - traefik-network
networks:
  traefik-network:
    driver: bridge  # Optional: define the network driver (default is `bridge`)
